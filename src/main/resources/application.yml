server:
  port: 8080

spring:
  application:
    name: agency

  # Database
  datasource:
    url: jdbc:postgresql://localhost:5432/freelance_agency_db
    username: postgres
    password: your_password_here
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Mail (Gmail SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@gmail.com
    password: your_app_password_here
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Devtools
  devtools:
    restart:
      enabled: true

# App custom config
app:
  frontend-url: http://localhost:5173
  admin-email: admin@yourdomain.com
  payment:
    razorpay-key-id: your_razorpay_key
    razorpay-key-secret: your_razorpay_secret
  booking:
    slot-duration-minutes: 60
    max-days-ahead: 14

# Logging
logging:
  level:
    com.freelance.agency: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG