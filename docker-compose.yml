version: '3.8'

services:

  # ── PostgreSQL ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agency_postgres
    restart: always
    environment:
      POSTGRES_DB: freelance_agency_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password_here
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agency_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agency_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/freelance_agency_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: your_password_here
      SPRING_MAIL_USERNAME: your_email@gmail.com
      SPRING_MAIL_PASSWORD: your_app_password_here
      APP_FRONTEND_URL: http://localhost:5173
      APP_ADMIN_EMAIL: admin@yourdomain.com
      APP_PAYMENT_RAZORPAY_KEY_ID: your_razorpay_key
      APP_PAYMENT_RAZORPAY_KEY_SECRET: your_razorpay_secret
      SPRING_SECURITY_USER_NAME: admin
      SPRING_SECURITY_USER_PASSWORD: admin@agency123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agency_network

volumes:
  postgres_data:

networks:
  agency_network:
    driver: bridge