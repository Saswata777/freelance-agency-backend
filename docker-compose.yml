version: '3.8'

services:

  # ── PostgreSQL ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agency_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agency_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agency_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}

      APP_FRONTEND_URL: ${FRONTEND_URL}
      APP_ADMIN_EMAIL: ${ADMIN_EMAIL}

      APP_PAYMENT_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      APP_PAYMENT_RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}

      SPRING_SECURITY_USER_NAME: ${ADMIN_USERNAME}
      SPRING_SECURITY_USER_PASSWORD: ${ADMIN_PASSWORD}

    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agency_network

volumes:
  postgres_data:

networks:
  agency_network:
    driver: bridge